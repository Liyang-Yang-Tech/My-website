<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图片展示</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif;}
        body {background-color: #f5f5f5; line-height: 1.6;}
        .nav {background: #2c3e50; padding: 15px; text-align: center;}
        .nav a {color: white; text-decoration: none; margin: 0 20px; font-size: 18px;}
        .nav a:hover {color: #3498db;}
        .container {width: 80%; margin: 30px auto; text-align: center;}
        h1 {color: #2c3e50; margin: 20px 0;}
        /* 多图片排版 */
        .img-group {display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 20px;}
        .gallery-img {width: 250px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}
    </style>
</head>
<body>
    <!-- 统一导航栏 -->
    <div class="nav">
        <a href="index.html">首页</a>
        <a href="about.html">关于我</a>
        <a href="gallery.html">图片展示</a>
    </div>

    <!-- 子网页2内容 -->
    <div class="container">
        <h1>精美图片展示</h1>
        <!-- 子网页2多张图片 -->
        <div class="img-group">
            <img src="https://picsum.photos/250/250?random=3" alt="风景图1" class="gallery-img">
            <img src="https://picsum.photos/250/250?random=4" alt="风景图2" class="gallery-img">
            <img src="https://picsum.photos/250/250?random=5" alt="风景图3" class="gallery-img">
        </div>
    </div>
</body>
</html>
